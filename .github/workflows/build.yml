name: Build Tizen WGT

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Build WGT
        run: |
          zip -j StreamFlow.wgt index.html config.xml

      - name: Upload WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamFlow-WGT
          path: StreamFlow.wgt
